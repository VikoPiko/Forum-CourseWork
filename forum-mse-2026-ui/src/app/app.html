<main class="app-shell">
  <header class="topbar">
    <div>
      <h1 data-cy="app-title">{{ title }}</h1>
      <p data-cy="app-description">{{ description }}</p>
    </div>
    <nav aria-label="Primary navigation">
      <a routerLink="/topics" routerLinkActive="active">Topics</a>
      @if (auth.isAuthenticated()) {
        <a routerLink="/topics/new" routerLinkActive="active">New topic</a>
        <button type="button" (click)="logout()">Logout</button>
      } @else {
        <a routerLink="/login" routerLinkActive="active">Login</a>
      }
    </nav>
  </header>

  <section class="status-strip" aria-label="Backend status">
    <span data-cy="status-label" [class]="statusClass()">{{ statusLabel() }}</span>
    <button type="button" data-cy="check-status" [disabled]="checking()" (click)="checkStatus()">
      {{ checking() ? 'Checking...' : 'Check backend status' }}
    </button>
  </section>

  <router-outlet></router-outlet>
</main>
