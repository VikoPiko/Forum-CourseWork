openapi: 3.0.3
info:
  description: REST API for forum posts and users (JWT bearer auth).
  title: Forum API
  version: 1.0.1
servers:
- description: Local
  url: http://localhost:9000
security:
- bearerAuth: []
tags:
- description: Authentication
  name: Auth
- description: Post operations
  name: Posts
- description: Replies on posts
  name: Replies
- description: User operations
  name: Users
paths:
  /auth/register:
    post:
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
          description: Created
        "400":
          description: Invalid request
        "409":
          description: Username already taken
      security: []
      summary: Register a regular form user
      tags:
      - Auth
      x-content-type: application/json
      x-accepts:
      - application/json
  /auth/login:
    post:
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          description: OK
        "401":
          description: Invalid credentials
      security: []
      summary: Obtain a JWT (username + password)
      tags:
      - Auth
      x-content-type: application/json
      x-accepts:
      - application/json
  /posts:
    get:
      operationId: listPosts
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/PostResponse'
                type: array
          description: OK
      security: []
      summary: List all posts
      tags:
      - Posts
      x-accepts:
      - application/json
    post:
      operationId: createPost
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
          description: Created
        "400":
          description: Invalid request
        "401":
          description: Authentication required
        "409":
          description: Title alreadyt exists
      summary: Create a post
      tags:
      - Posts
      x-content-type: application/json
      x-accepts:
      - application/json
  /posts/{id}:
    get:
      operationId: getPostById
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          format: int64
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
          description: Found
        "404":
          description: Not found
      security: []
      summary: Get post by id
      tags:
      - Posts
      x-accepts:
      - application/json
    put:
      operationId: updatePost
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          format: int64
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePostRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
          description: OK
        "400":
          description: Invalid request
        "403":
          description: Forbidden
        "404":
          description: Not FOund
        "409":
          description: Title already exists
      summary: Update a post (topic)
      tags:
      - Posts
      x-content-type: application/json
      x-accepts:
      - application/json
  /posts/{postId}/replies:
    get:
      operationId: listRepliesForPost
      parameters:
      - explode: false
        in: path
        name: postId
        required: true
        schema:
          format: int64
          type: integer
        style: simple
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 0
          format: int64
          minimum: 0
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/PageReplyResponse'
                type: array
          description: OK
        "404":
          description: Post not found
      security: []
      summary: List replies for a post
      tags:
      - Replies
      x-accepts:
      - application/json
    post:
      operationId: createReply
      parameters:
      - explode: false
        in: path
        name: postId
        required: true
        schema:
          format: int64
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReplyRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplyResponse'
          description: Created
        "404":
          description: Post not found
      summary: Create a reply on a post
      tags:
      - Replies
      x-content-type: application/json
      x-accepts:
      - application/json
  /replies/{id}:
    get:
      operationId: getReplyById
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          format: int64
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplyResponse'
          description: Found
        "404":
          description: Not found
      security: []
      summary: Get reply by id
      tags:
      - Replies
      x-accepts:
      - application/json
  /users:
    get:
      operationId: listUsers
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/UserResponse'
                type: array
          description: OK
      summary: List all users
      tags:
      - Users
      x-accepts:
      - application/json
    post:
      operationId: createUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: Created
        "409":
          description: Username or email already in use
      summary: Create a user
      tags:
      - Users
      x-content-type: application/json
      x-accepts:
      - application/json
  /users/{id}:
    delete:
      operationId: deleteUser
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          format: int64
          type: integer
        style: simple
      responses:
        "204":
          description: No content
        "404":
          description: Not found
      summary: Delete a user
      tags:
      - Users
      x-accepts:
      - application/json
    get:
      operationId: getUserById
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          format: int64
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: Found
        "404":
          description: Not found
      summary: Get user by id
      tags:
      - Users
      x-accepts:
      - application/json
    put:
      operationId: updateUser
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          format: int64
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: OK
        "404":
          description: Not found
        "409":
          description: Username or email already in use
      summary: Update a user
      tags:
      - Users
      x-content-type: application/json
      x-accepts:
      - application/json
components:
  schemas:
    RegisterRequest:
      example:
        password: password
        username: username
      properties:
        username:
          maxLength: 100
          minLength: 1
          type: string
        password:
          maxLength: 128
          minLength: 8
          type: string
      required:
      - password
      - username
      type: object
    RegisterResponse:
      example:
        id: 0
        username: username
      properties:
        id:
          format: int64
          type: integer
        username:
          type: string
      required:
      - id
      - username
      type: object
    LoginRequest:
      example:
        password: password
        username: username
      properties:
        username:
          maxLength: 100
          minLength: 1
          type: string
        password:
          maxLength: 128
          minLength: 1
          type: string
      required:
      - password
      - username
      type: object
    LoginResponse:
      example:
        accessToken: accessToken
        tokenType: Bearer
        expiresInSeconds: 0
      properties:
        accessToken:
          type: string
        tokenType:
          example: Bearer
          type: string
        expiresInSeconds:
          format: int64
          type: integer
      required:
      - accessToken
      - expiresInSeconds
      - tokenType
      type: object
    UserRole:
      description: USER denotes a regular (non-privileged) account.
      enum:
      - ADMIN
      - MODERATOR
      - USER
      type: string
    CreateUserRequest:
      example:
        password: password
        role: ADMIN
        email: email
        username: username
      properties:
        username:
          maxLength: 100
          minLength: 1
          type: string
        email:
          format: email
          maxLength: 320
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        password:
          description: Stored as a bcrypt hash; max 72 bytes for bcrypt.
          maxLength: 72
          minLength: 8
          type: string
      required:
      - password
      - role
      - username
      type: object
    UpdateUserRequest:
      example:
        password: password
        role: ADMIN
        email: email
        username: username
      properties:
        username:
          maxLength: 100
          minLength: 1
          type: string
        email:
          format: email
          maxLength: 320
          nullable: true
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        password:
          description: "If set, replaces the password."
          maxLength: 72
          minLength: 8
          type: string
      required:
      - role
      - username
      type: object
    UserResponse:
      example:
        createdAt: 2000-01-23T04:56:07.000+00:00
        role: ADMIN
        id: 0
        email: email
        username: username
      properties:
        id:
          format: int64
          type: integer
        username:
          type: string
        email:
          format: email
          nullable: true
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        createdAt:
          format: date-time
          type: string
      required:
      - createdAt
      - id
      - role
      - username
      type: object
    CreatePostRequest:
      example:
        title: title
        content: content
      properties:
        title:
          maxLength: 500
          type: string
        content:
          maxLength: 10000
          type: string
      required:
      - content
      - title
      type: object
    PostResponse:
      example:
        createdByUserId: 6
        createdAt: 2000-01-23T04:56:07.000+00:00
        createdByUsername: createdByUsername
        id: 0
        viewCount: 1
        title: title
        content: content
        updatedAt: 2000-01-23T04:56:07.000+00:00
      properties:
        id:
          format: int64
          type: integer
        title:
          type: string
        content:
          type: string
        createdByUserId:
          format: int64
          type: integer
        createdByUsername:
          type: string
        createdAt:
          format: date-time
          type: string
        updatedAt:
          format: date-time
          type: string
        viewCount:
          format: int64
          type: integer
      required:
      - content
      - createdAt
      - createdByUserId
      - createdByUsername
      - id
      - title
      - updatedAt
      - viewCount
      type: object
    UpdatePostRequest:
      example:
        title: title
        content: content
      properties:
        title:
          maxLength: 500
          minLength: 1
          type: string
        content:
          maxLength: 1000
          minLength: 1
          type: string
      required:
      - content
      - title
      type: object
    CreateReplyRequest:
      example:
        content: content
      properties:
        content:
          maxLength: 10000
          type: string
      required:
      - content
      type: object
    ReplyResponse:
      example:
        createdByUserId: 1
        createdAt: 2000-01-23T04:56:07.000+00:00
        createdByUsername: createdByUsername
        id: 0
        postId: 6
        text: text
        updatedAt: 2000-01-23T04:56:07.000+00:00
      properties:
        id:
          format: int64
          type: integer
        postId:
          format: int64
          type: integer
        text:
          type: string
        createdByUserId:
          format: int64
          type: integer
        createdByUsername:
          type: string
        createdAt:
          format: date-time
          type: string
        updatedAt:
          format: date-time
          type: string
      required:
      - createdAt
      - createdByUserId
      - createdByUsername
      - id
      - postId
      - text
      - updatedAt
      type: object
    PageReplyResponse:
      example:
        size: 5
        totalPages: 7
        page: 5
        items:
        - createdByUserId: 1
          createdAt: 2000-01-23T04:56:07.000+00:00
          createdByUsername: createdByUsername
          id: 0
          postId: 6
          text: text
          updatedAt: 2000-01-23T04:56:07.000+00:00
        - createdByUserId: 1
          createdAt: 2000-01-23T04:56:07.000+00:00
          createdByUsername: createdByUsername
          id: 0
          postId: 6
          text: text
          updatedAt: 2000-01-23T04:56:07.000+00:00
        totalElements: 2
      properties:
        items:
          items:
            $ref: '#/components/schemas/ReplyResponse'
          type: array
        page:
          format: int32
          type: integer
        size:
          format: int32
          type: integer
        totalElements:
          format: int64
          type: integer
        totalPages:
          format: int32
          type: integer
      required:
      - items
      - page
      - size
      - totalElements
      - totalPages
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      scheme: bearer
      type: http

