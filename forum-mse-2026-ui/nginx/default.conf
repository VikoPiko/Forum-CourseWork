server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Docker's embedded DNS resolver. Putting the upstream behind a variable +
  # resolver means nginx does NOT try to resolve BACKEND_UPSTREAM at startup,
  # so the container boots even if the backend is not yet reachable. Requests
  # will simply 502 until the backend comes online.
  resolver 127.0.0.11 valid=30s ipv6=off;

  # Single-page app fallback — every unknown path returns index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy backend calls. BACKEND_UPSTREAM is templated by the entrypoint;
  # defaults to the Compose service name `backend` on port 9000.
  location ~ ^/api/(.*)$ {
    set $backend "${BACKEND_UPSTREAM}";
    proxy_pass         $backend/$1$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }
}
