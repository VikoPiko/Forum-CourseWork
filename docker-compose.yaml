services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: forum_app
      POSTGRES_USER: forum_app
      POSTGRES_PASSWORD: change-me-dev-db-password
    ports:
      - "5433:5432"
    volumes:
      - forum_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forum_app -d forum_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./forum-mse-2026
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/forum_app
      SPRING_DATASOURCE_USERNAME: forum_app
      SPRING_DATASOURCE_PASSWORD: change-me-dev-db-password
      JWT_SECRET: change-me-compose-secret-at-least-32-chars
      JWT_EXPIRATION_MS: 86400000
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./forum-mse-2026-ui
    environment:
      BACKEND_BASE_URL: ""
      BACKEND_UPSTREAM: http://backend:9000
    ports:
      - "4200:80"
    depends_on:
      - backend

  adminer:
    image: adminer:4
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  forum_postgres_data:
